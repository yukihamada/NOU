name: Build & Release nou-server

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v2.2.0)'
        required: true

jobs:
  build-linux-x86:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - run: sudo apt-get install -y musl-tools
      - name: Build
        working-directory: nou-server
        run: cargo build --release --target x86_64-unknown-linux-musl
      - run: |
          cp nou-server/target/x86_64-unknown-linux-musl/release/nou-server ./nou-server-linux-x86_64
          chmod +x nou-server-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: nou-server-linux-x86_64
          path: nou-server-linux-x86_64

  build-linux-arm64:
    name: Linux arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl
      - run: sudo apt-get install -y gcc-aarch64-linux-gnu musl-tools
      - name: Build
        working-directory: nou-server
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target aarch64-unknown-linux-musl
      - run: |
          cp nou-server/target/aarch64-unknown-linux-musl/release/nou-server ./nou-server-linux-arm64
          chmod +x nou-server-linux-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: nou-server-linux-arm64
          path: nou-server-linux-arm64

  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        working-directory: nou-server
        run: cargo build --release
      - run: copy nou-server\target\release\nou-server.exe nou-server-windows-x86_64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: nou-server-windows-x86_64
          path: nou-server-windows-x86_64.exe

  release:
    name: Create GitHub Release
    needs: [build-linux-x86, build-linux-arm64, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create install scripts
        run: |
          cat > install.sh << 'SCRIPT'
          #!/bin/bash
          set -e
          OS=$(uname -s)
          ARCH=$(uname -m)
          VERSION=${1:-latest}
          BASE="https://github.com/yukihamada/NOU/releases"

          if [ "$VERSION" = "latest" ]; then
            URL="$BASE/latest/download"
          else
            URL="$BASE/download/$VERSION"
          fi

          if [ "$ARCH" = "x86_64" ]; then
            BIN="nou-server-linux-x86_64"
          elif [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
            BIN="nou-server-linux-arm64"
          else
            echo "Unsupported architecture: $ARCH"
            exit 1
          fi

          echo "Downloading NOU server..."
          curl -fsSL "$URL/$BIN" -o /usr/local/bin/nou-server
          chmod +x /usr/local/bin/nou-server

          echo ""
          echo "✓ NOU server installed!"
          echo ""
          echo "Next steps:"
          echo "  1. Install Ollama: https://ollama.com/download"
          echo "  2. Pull a model:   ollama pull gemma3:4b"
          echo "  3. Start NOU:      nou-server"
          echo "  4. Open dashboard: http://localhost:4001"
          SCRIPT
          chmod +x install.sh

          cat > install.ps1 << 'PS'
          $Version = if ($args[0]) { $args[0] } else { "latest" }
          $Base = "https://github.com/yukihamada/NOU/releases"
          if ($Version -eq "latest") { $Url = "$Base/latest/download" } else { $Url = "$Base/download/$Version" }
          $Bin = "nou-server-windows-x86_64.exe"
          $Dest = "$env:LOCALAPPDATA\NOU\nou-server.exe"
          New-Item -ItemType Directory -Force -Path "$env:LOCALAPPDATA\NOU" | Out-Null
          Write-Host "Downloading NOU server..."
          Invoke-WebRequest "$Url/$Bin" -OutFile $Dest
          Write-Host ""
          Write-Host "NOU server installed to $Dest"
          Write-Host ""
          Write-Host "Next steps:"
          Write-Host "  1. Install Ollama: https://ollama.com/download"
          Write-Host "  2. Pull a model:   ollama pull gemma3:4b"
          Write-Host "  3. Start NOU:      $Dest"
          Write-Host "  4. Open dashboard: http://localhost:4001"
          PS

      - name: Get version
        id: version
        run: echo "tag=${GITHUB_REF_NAME:-${{ github.event.inputs.version }}}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "NOU ${{ steps.version.outputs.tag }}"
          body: |
            ## NOU ${{ steps.version.outputs.tag }}

            ### Mac (Apple Silicon) — β ベータ版
            [NOU.app をダウンロード](https://github.com/yukihamada/NOU/releases/latest) ← 従来のリンク

            ---

            ### Linux — α アルファ版

            **クイックインストール:**
            ```bash
            curl -sSL https://github.com/yukihamada/NOU/releases/latest/download/install.sh | sudo bash
            ```

            **手動:**
            | アーキテクチャ | ファイル |
            |---|---|
            | x86_64 (Intel/AMD) | `nou-server-linux-x86_64` |
            | arm64 (Raspberry Pi 5, AWS Graviton) | `nou-server-linux-arm64` |

            ---

            ### Windows — α アルファ版

            **PowerShell:**
            ```powershell
            irm https://github.com/yukihamada/NOU/releases/latest/download/install.ps1 | iex
            ```

            **手動:** `nou-server-windows-x86_64.exe` をダウンロードして実行

            ---

            ### セットアップ (Linux/Windows共通)
            1. [Ollama](https://ollama.com/download) をインストール
            2. `ollama pull gemma3:4b`
            3. `nou-server` を起動
            4. ブラウザで http://localhost:4001 を開く
            5. Claude Code の `ANTHROPIC_BASE_URL=http://localhost:4001` に設定
          files: |
            nou-server-linux-x86_64
            nou-server-linux-arm64
            nou-server-windows-x86_64.exe
            install.sh
            install.ps1
          draft: false
          prerelease: true
