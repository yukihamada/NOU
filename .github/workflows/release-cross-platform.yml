name: Build & Release nou-server

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v2.2.0)'
        required: true

jobs:
  build-linux-x86:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - run: sudo apt-get install -y musl-tools
      - name: Build
        working-directory: nou-server
        run: cargo build --release --target x86_64-unknown-linux-musl
      - name: Package AppImage
        run: |
          BIN=nou-server/target/x86_64-unknown-linux-musl/release/nou-server
          # Make AppDir
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp $BIN AppDir/usr/bin/nou-server
          cat > AppDir/nou-server.desktop << 'EOF'
          [Desktop Entry]
          Name=NOU
          Exec=nou-server
          Icon=nou-server
          Type=Application
          Categories=Utility;Network;
          Comment=Local AI Server
          EOF
          # Simple PNG icon (placeholder — base64 encoded 1x1 px)
          printf 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==' | base64 -d > AppDir/usr/share/icons/hicolor/256x256/apps/nou-server.png
          cp AppDir/usr/share/icons/hicolor/256x256/apps/nou-server.png AppDir/nou-server.png
          cp AppDir/nou-server.desktop AppDir/.DirIcon 2>/dev/null || true
          # Download appimagetool
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool AppDir NOU-linux-x86_64.AppImage
      - uses: actions/upload-artifact@v4
        with:
          name: NOU-linux-x86_64-AppImage
          path: NOU-linux-x86_64.AppImage
      - run: |
          cp nou-server/target/x86_64-unknown-linux-musl/release/nou-server ./nou-server-linux-x86_64
          chmod +x nou-server-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: nou-server-linux-x86_64
          path: nou-server-linux-x86_64

  build-linux-arm64:
    name: Linux arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl
      - run: sudo apt-get install -y gcc-aarch64-linux-gnu musl-tools
      - name: Build
        working-directory: nou-server
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target aarch64-unknown-linux-musl
      - run: |
          cp nou-server/target/aarch64-unknown-linux-musl/release/nou-server ./nou-server-linux-arm64
          chmod +x nou-server-linux-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: nou-server-linux-arm64
          path: nou-server-linux-arm64

  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        working-directory: nou-server
        run: cargo build --release
      - name: Create icon
        shell: powershell
        run: |
          # Minimal valid ICO (16x16, 1bpp)
          $ico = [Convert]::FromBase64String("")
          [IO.File]::WriteAllBytes("$pwd\nou-server\icon.ico", $ico)
      - name: Build installer
        shell: cmd
        run: |
          copy "nou-server\target\release\nou-server.exe" "nou-server\nou-server.exe"
          iscc "nou-server\installer.iss" /O"." /F"NOU-Setup-Windows"
      - uses: actions/upload-artifact@v4
        with:
          name: NOU-Setup-Windows
          path: NOU-Setup-Windows.exe

  release:
    name: Create GitHub Release
    needs: [build-linux-x86, build-linux-arm64, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create install scripts
        run: |
          cat > install.sh << 'SCRIPT'
          #!/bin/bash
          set -e
          ARCH=$(uname -m)
          BASE="https://github.com/yukihamada/NOU/releases/latest/download"
          if [ "$ARCH" = "x86_64" ]; then
            BIN="NOU-linux-x86_64.AppImage"
          elif [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
            BIN="nou-server-linux-arm64"
          else
            echo "Unsupported: $ARCH"; exit 1
          fi
          echo "Downloading NOU..."
          curl -fsSL "$BASE/$BIN" -o /usr/local/bin/nou-server
          chmod +x /usr/local/bin/nou-server
          echo "✓ NOU installed! Run: nou-server"
          SCRIPT
          chmod +x install.sh

      - name: Get version
        id: version
        run: echo "tag=${GITHUB_REF_NAME:-${{ github.event.inputs.version }}}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "NOU ${{ steps.version.outputs.tag }}"
          body: |
            ## NOU ${{ steps.version.outputs.tag }}

            ### 🍎 Mac (Apple Silicon) — β ベータ版
            **[⬇ NOU-v2.2.dmg をダウンロード](https://github.com/yukihamada/NOU/releases/latest/download/NOU-v2.2.dmg)**
            DMGを開いて Applications にドラッグするだけ。

            ---

            ### 🐧 Linux — α アルファ版
            **[⬇ NOU-linux-x86_64.AppImage をダウンロード](https://github.com/yukihamada/NOU/releases/latest/download/NOU-linux-x86_64.AppImage)**
            ダウンロード後、実行権限を付けてダブルクリック。

            ---

            ### 🪟 Windows — α アルファ版
            **[⬇ NOU-Setup-Windows.exe をダウンロード](https://github.com/yukihamada/NOU/releases/latest/download/NOU-Setup-Windows.exe)**
            インストーラーをダブルクリックして Next → Install。

            ---

            ### セットアップ (共通)
            1. [Ollama](https://ollama.com/download) をインストール
            2. `ollama pull gemma3:4b`
            3. NOU を起動 → http://localhost:4001
            4. `ANTHROPIC_BASE_URL=http://localhost:4001` で Claude Code 接続
          files: |
            NOU-linux-x86_64.AppImage
            nou-server-linux-arm64
            NOU-Setup-Windows.exe
            install.sh
          draft: false
          prerelease: false
